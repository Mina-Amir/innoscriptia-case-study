services:
  dev:
    env_file:
      - ../.env
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    profiles: [dev]

  prod:
    env_file:
      - ../.env
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    profiles: [prod]
